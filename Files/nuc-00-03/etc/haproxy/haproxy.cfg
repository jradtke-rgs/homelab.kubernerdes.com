global
  log 127.0.0.1:514 local0
  maxconn 32768
  chroot /var/lib/haproxy
  user haproxy
  group haproxy
  daemon
  stats socket /var/lib/haproxy/stats user haproxy group haproxy mode 0640 level operator
  tune.bufsize 32768
  tune.ssl.default-dh-param 2048
  ssl-default-bind-ciphers ALL:!aNULL:!eNULL:!EXPORT:!DES:!3DES:!MD5:!PSK:!RC4:!ADH:!LOW@STRENGTH
  ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
  log     global
  mode    http
  option  log-health-checks
  option  log-separate-errors
  option  dontlog-normal
  option  dontlognull
  option  httplog
  option  socket-stats
  retries 3
  option  redispatch
  maxconn 10000
  timeout connect     5s
  timeout client     50s
  timeout server    450s

listen stats
    bind *:9000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:rancher

# ************************************************************
# Rancher Manager cluster — VIP: ${RANCHER_VIP}
# ************************************************************
frontend rancher-http
    bind ${RANCHER_VIP}:80
    mode tcp
    default_backend rancher-http-backend

backend rancher-http-backend
    mode tcp
    balance roundrobin
    option tcp-check
    server rancher-01 ${RANCHER_NODE_01}:80  check fall 3 rise 2
    server rancher-02 ${RANCHER_NODE_02}:80  check fall 3 rise 2
    server rancher-03 ${RANCHER_NODE_03}:80  check fall 3 rise 2

frontend rancher-https
    bind ${RANCHER_VIP}:443
    mode tcp
    default_backend rancher-https-backend

backend rancher-https-backend
    mode tcp
    balance roundrobin
    option tcp-check
    server rancher-01 ${RANCHER_NODE_01}:443  check fall 3 rise 2
    server rancher-02 ${RANCHER_NODE_02}:443  check fall 3 rise 2
    server rancher-03 ${RANCHER_NODE_03}:443  check fall 3 rise 2

frontend rancher-k8s-api
    bind ${RANCHER_VIP}:6443
    mode tcp
    default_backend rancher-k8s-api-backend

backend rancher-k8s-api-backend
    mode tcp
    balance roundrobin
    option tcp-check
    server rancher-01 ${RANCHER_NODE_01}:6443  check fall 3 rise 2
    server rancher-02 ${RANCHER_NODE_02}:6443  check fall 3 rise 2
    server rancher-03 ${RANCHER_NODE_03}:6443  check fall 3 rise 2

frontend rancher-rke2-register
    bind ${RANCHER_VIP}:9345
    mode tcp
    default_backend rancher-rke2-register-backend

backend rancher-rke2-register-backend
    mode tcp

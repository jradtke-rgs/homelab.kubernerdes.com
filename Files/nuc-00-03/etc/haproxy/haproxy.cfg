    balance roundrobin
    option tcp-check
    server apps-01 10.0.3.9:443 check fall 3 rise 2
    server apps-02 10.0.3.10:443 check fall 3 rise 2
    server apps-03 10.0.3.11:443 check fall 3 rise 2

frontend apps-k8s-api
    bind 10.0.0.230:6443
    mode tcp
    default_backend apps-k8s-api-backend

backend apps-k8s-api-backend
    mode tcp
    balance roundrobin
    option tcp-check
    server apps-01 10.0.3.9:6443 check fall 3 rise 2
    server apps-02 10.0.3.10:6443 check fall 3 rise 2
    server apps-03 10.0.3.11:6443 check fall 3 rise 2

frontend apps-k8s-certs
    bind 10.0.0.230:9345
    mode tcp
    default_backend apps-k8s-certs-backend

backend apps-k8s-certs-backend
    mode tcp
    balance roundrobin
    option tcp-check
    server apps-01 10.0.3.9:9345 check fall 3 rise 2
    server apps-02 10.0.3.10:9345 check fall 3 rise 2
    server apps-03 10.0.3.11:9345 check fall 3 rise 2

    option tcp-check
    server rancher-01 ${RANCHER_NODE_01}:9345  check fall 3 rise 2
    server rancher-02 ${RANCHER_NODE_02}:9345  check fall 3 rise 2
    server rancher-03 ${RANCHER_NODE_03}:9345  check fall 3 rise 2


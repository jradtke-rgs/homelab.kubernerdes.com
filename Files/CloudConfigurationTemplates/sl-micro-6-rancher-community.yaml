    # Add SSH public keys for passwordless authentication
    ssh_authorized_keys:
      - ssh-rsa  mansible@kubernerd
      - ecdsa-sha2-nistp521 AAAAE2VjZHNhLXNoYTItbmlzdHA1MjEAAAAIbmlzdHA1MjEAAACFBADUeWpBo8XY3ePFn/vX2yMjx8MfC3ZO1Jl6t5jZ0hCHwcc9x4Yp4ASXn1epmfEFqmhTJkEKunJafpKnQ0lm1yW/KgA+ew7t+dq2l0yck6/X3cPZlxf8nYIvTXmHf6DYhJ54U26bTaB8iSaXkhRt2RiKWDeqbFp6oJkiWQMtppJuHJlIbA== mansible@nuc-00-02
      - ssh-rsa  mansible@nuc-00
      - ecdsa-sha2-nistp521 AAAAE2VjZHNhLXNoYTItbmlzdHA1MjEAAAAIbmlzdHA1MjEAAACFBABZ7vctl6viLsGcGmaLcZ1aGFoRtfAU4DKd7r7XZD5WMXSi9/nh0W3xngBwK6gpE3qHUj8noB7OzpfkE0aE937SuwEmeOPtIK2VhSuG3oAxmCz9ohqLtC9jRkXapddvTYCPG3KLsgJlueCRI6iZlZ6FVGOHeGOgw1KXOzbi4Ye5pJV+dg== mansible@nuc-00

# Commands to run after the system is configured
runcmd:
  # Configure static IP via NetworkManager based on hostname
  - |
    #!/bin/bash
    set -euo pipefail

    # --- Configuration ---
    GATEWAY="10.10.12.1"
    DNS_SERVERS="10.10.12.8 10.10.12.9 8.8.8.8"
    DNS_DOMAIN="community.kubernerdes.com"
    LOG_FILE="/var/log/static-ip-setup.log"

    # --- Hostname-to-IP Map ---
    HOSTNAME=$(cat /etc/hostname 2>/dev/null || hostname)

    case "$HOSTNAME" in
      rancher-01)         IPADDR="10.10.14.211/22" ;;
      rancher-02)         IPADDR="10.10.14.212/22" ;;
      rancher-03)         IPADDR="10.10.14.213/22" ;;
      *)
        echo "$(date): Unknown hostname '$HOSTNAME' - skipping static IP" | tee -a "$LOG_FILE"
        exit 0
        ;;
    esac

    # --- Apply Static IP ---
    echo "========================================" | tee -a "$LOG_FILE"
    echo "$(date): Configuring static IP for $HOSTNAME" | tee -a "$LOG_FILE"
    echo "Target IP: $IPADDR" | tee -a "$LOG_FILE"

    IFACE=$(ip route | grep default | awk '{print $5}' | head -n1)
    if [ -z "$IFACE" ]; then
      echo "ERROR: No network interface found" | tee -a "$LOG_FILE"
      exit 1
    fi
    echo "Interface: $IFACE" | tee -a "$LOG_FILE"

    # Disable cloud-init network config to prevent conflicts on reboot
    mkdir -p /etc/cloud/cloud.cfg.d
    cat > /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg <<INNEREOF
    network: {config: disabled}
    INNEREOF

    # Parse CIDR
    IP_ONLY=${IPADDR%/*}
    PREFIX=${IPADDR#*/}

    # Find and replace the active connection
    CONN_NAME=$(nmcli -t -f NAME,DEVICE connection show --active | grep "$IFACE" | cut -d: -f1)
    CONN_NAME=${CONN_NAME:-$IFACE}

    nmcli connection delete "$CONN_NAME" 2>/dev/null || true
    nmcli connection add type ethernet \
      con-name "$CONN_NAME" \
      ifname "$IFACE" \
      ipv4.method manual \
      ipv4.addresses "$IP_ONLY/$PREFIX" \
      ipv4.gateway "$GATEWAY" \
      ipv4.dns "$DNS_SERVERS" \
      ipv4.dns-search "$DNS_DOMAIN" \
      connection.autoconnect yes

    nmcli connection up "$CONN_NAME"

    echo "$(date): Configured $IFACE with $IPADDR" | tee -a "$LOG_FILE"
    ip addr show "$IFACE" | tee -a "$LOG_FILE"
    echo "========================================" | tee -a "$LOG_FILE"

  # Enable and start the QEMU guest agent service immediately
  - - systemctl
    - enable
    - --now
    - qemu-guest-agent.service

# Configure NTP (Network Time Protocol) for time synchronization
# SL-Micro uses systemd-timesyncd by default
ntp:
  # Enable NTP service
  enabled: true
  # List of NTP servers to synchronize time with
  servers:
    - 0.pool.suse.ntp.org
    - 1.pool.suse.ntp.org
    - 2.pool.suse.ntp.org

# Create or modify files on the system
write_files:
  # Create sudoers configuration file for sles user
  - path: /etc/sudoers.d/sles
    # Grant sles user full sudo privileges without password prompt
    content: |
      sles ALL=(ALL) NOPASSWD:ALL
    # Set file ownership
    owner: root:root
    # Set file permissions (read-only for owner and group, no access for others)
    permissions: '0440'

  # Configure systemd-timesyncd for the specified NTP servers
  - path: /etc/systemd/timesyncd.conf.d/suse-ntp.conf
    content: |
      [Time]
      NTP=0.pool.suse.ntp.org 1.pool.suse.ntp.org 2.pool.suse.ntp.org
      FallbackNTP=time.cloudflare.com
    owner: root:root
    permissions: '0644'

# dhcpd.conf — DHCP server configuration for ${BASE_DOMAIN}
#
# Generated from this template by envsubst during nuc-00-01 post_install.
# Variables are resolved from Scripts/env.sh at install time.
#
# Supernet: ${SUBNET_CIDR}   (covers all three environment /24s + DHCP pool)
# Domain:   ${BASE_DOMAIN}
# DNS:      ${DNS1_IP}, ${DNS2_IP}
# DHCP pool: ${DHCP_RANGE_START} – ${DHCP_RANGE_END}

# iPXE option definitions
option space pxelinux;
option pxelinux.magic code 208 = string;
option pxelinux.configfile code 209 = text;
option pxelinux.pathprefix code 210 = text;
option pxelinux.reboottime code 211 = unsigned integer 32;
option architecture-type code 93 = unsigned integer 16;

# Global options
option domain-name "${BASE_DOMAIN}";
option domain-name-servers ${DNS1_IP}, ${DNS2_IP}, 8.8.8.8;
default-lease-time 7200;
max-lease-time 7200;
authoritative;

# Subnet declaration — covers the full 10.10.12.0/22 supernet
subnet ${SUPERNET_PREFIX}.0 netmask ${SUBNET_MASK} {
    option routers ${GATEWAY};
    option subnet-mask ${SUBNET_MASK};

    # Dynamic pool — last /24 of the /22, shared across all environments
    pool {
        range ${DHCP_RANGE_START} ${DHCP_RANGE_END};
    }

    # TFTP server for initial iPXE handoff
    next-server ${DNS1_IP};

    # UEFI boot: send iPXE binary, then redirect iPXE clients to menu
    if exists user-class and option user-class = "iPXE" {
        filename "http://${ADMIN_IP}/ipxe-menu";
    } else {
        filename "ipxe.efi";
    }
}

# ---------------------------------------------------------------------------
# Fixed hosts — Harvester cluster nodes
# NUC0x_HOST and MACs are set per environment in Scripts/env.d/${ENVIRONMENT}.sh
# ---------------------------------------------------------------------------

host ${NUC01_HOST} {
    hardware ethernet ${NUC01_MAC};
    fixed-address ${NUC01_IP};
    option host-name "${NUC01_HOST}";
    if exists user-class and option user-class = "iPXE" {
        filename "http://${ADMIN_IP}/harvester/harvester/ipxe-menu";
    } else {
        filename "ipxe.efi";
    }
}

host ${NUC02_HOST} {
    hardware ethernet ${NUC02_MAC};
    fixed-address ${NUC02_IP};
    option host-name "${NUC02_HOST}";
    if exists user-class and option user-class = "iPXE" {
        filename "http://${ADMIN_IP}/harvester/harvester/ipxe-menu";
    } else {
        filename "ipxe.efi";
    }
}

host ${NUC03_HOST} {
    hardware ethernet ${NUC03_MAC};
    fixed-address ${NUC03_IP};
    option host-name "${NUC03_HOST}";
    if exists user-class and option user-class = "iPXE" {
        filename "http://${ADMIN_IP}/harvester/harvester/ipxe-menu";
    } else {
        filename "ipxe.efi";
    }
}

include "/etc/dhcpd.d/dhcpd-hosts.conf";

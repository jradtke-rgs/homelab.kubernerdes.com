# dhcpd-hosts.conf — Additional fixed DHCP host entries
#
# Add entries here for hosts beyond the 3 Harvester nodes.
# This file is included by dhcpd.conf and can be updated without
# rewriting the main config.
#
# Format:
# host <hostname> {
#     hardware ethernet <mac>;
#     fixed-address <ip>;
#     option host-name "<hostname>";
# }
